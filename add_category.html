{% extends "base.html" %}
{% block content %}
<h2>Add Category</h2>
<form method="post">
    <div class="mb-3">
        <label for="category_name" class="form-label">Category Name</label>
        <input type="text" id="category_name" name="category_name" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Category</button>
</form>
{% endblock %}
